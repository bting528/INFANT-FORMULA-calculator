<!DOCTYPE html>
<html>
<head>
    <title>Clinical Formula Calc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; margin-top: 0; border-bottom: 2px solid #eef; padding-bottom: 10px; }
        .section-title { font-size: 0.9em; color: #666; text-transform: uppercase; margin-top: 20px; font-weight: bold; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.95em; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: #0056b3; outline: none; }
        .result-box { margin-top: 25px; padding: 20px; background: #e3f2fd; border-radius: 10px; border-left: 6px solid #2196f3; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1.1em; }
        .val { font-weight: bold; color: #000; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍼 Formula Intake Calc</h2>
    
    <label>Infant Weight (kg)</label>
    <input type="number" id="weight" value="3.5" step="0.1" oninput="calculate()">

    <label>Select Formula Profile</label>
    <select id="formula" onchange="calculate()">
        <optgroup label="Polymeric (Standard/High Energy)">
            <option value="67,1.3,7.0,4.4">Standard Stage 1 (C20)</option>
            <option value="74,2.1,7.7,4.9">Enfamil A+ Step Up (C22)</option>
            <option value="81,2.4,8.9,5.1">Frisolac Premature (C24)</option>
            <option value="101,2.6,10.3,5.0">Infatrini (C30)</option>
            <option value="100,3.0,11.0,7.9">Nutren Junior (C30)</option>
        </optgroup>
        <optgroup label="Extensively Hydrolyzed (EHF)">
            <option value="67,1.8,6.8,4.5">Pepti-Junior (C20)</option>
            <option value="100,3.0,11.0,8.0">Peptamen Junior (C30)</option>
            <option value="66,1.9,6.9,4.5">Alfare (C20)</option>
        </optgroup>
        <optgroup label="Amino Acid (Elemental)">
            <option value="67,1.8,7.2,4.6">Neocate LCP (C20)</option>
            <option value="100,3.0,11.0,8.0">Neocate Junior (C30)</option>
        </optgroup>
        <optgroup label="Specialty">
            <option value="67,1.7,6.8,4.4">Isomil (Soy - C20)</option>
            <option value="67,1.4,7.0,4.3">Frisolac Comfort (C20)</option>
            <option value="67,1.4,7.2,4.3">Enfamil LactoFree</option>
        </optgroup>
    </select>

    <div class="grid">
        <div>
            <label>Scoops/Feed</label>
            <input type="number" id="scoops" value="3" step="0.5" oninput="calculate()">
        </div>
        <div>
            <label>Water (ml)</label>
            <input type="number" id="water" value="90" oninput="calculate()">
        </div>
    </div>

    <label>Feeds per Day</label>
    <input type="number" id="feeds" value="8" oninput="calculate()">

    <div class="result-box" id="results">
        </div>
</div>

<script>
function calculate() {
    const weight = parseFloat(document.getElementById('weight').value) || 1;
    const formulaData = document.getElementById('formula').value.split(',');
    
    const kcal100 = parseFloat(formulaData[0]);
    const pro100 = parseFloat(formulaData[1]);
    const cho100 = parseFloat(formulaData[2]);
    const scoopG = parseFloat(formulaData[3]);
    
    const scoops = parseFloat(document.getElementById('scoops').value) || 0;
    const water = parseFloat(document.getElementById('water').value) || 0;
    const numFeeds = parseFloat(document.getElementById('feeds').value) || 0;
    
    // Math Logic
    const powderG = scoops * scoopG;
    const volPerFeed = water + (powderG * 0.75); // Displacement
    const dailyVol = volPerFeed * numFeeds;
    
    const totalKcal = (kcal100 / 100) * dailyVol;
    const totalPro = (pro100 / 100) * dailyVol;
    const totalCho = (cho100 / 100) * dailyVol;
    
    const peRatio = (totalPro / totalKcal) * 100;

    document.getElementById('results').innerHTML = `
        <div class="stats"><span>Energy:</span> <span class="val">${(totalKcal/weight).toFixed(1)} kcal/kg</span></div>
        <div class="stats"><span>Protein:</span> <span class="val">${(totalPro/weight).toFixed(2)} g/kg</span></div>
        <div class="stats"><span>Carbs:</span> <span class="val">${(totalCho/weight).toFixed(1)} g/kg</span></div>
        <div class="stats"><span>Fluid:</span> <span class="val">${(dailyVol/weight).toFixed(0)} ml/kg</span></div>
        <hr style="border:0; border-top:1px solid #bcd; margin:10px 0;">
        <div class="stats" style="font-size:0.9em; color:#555;">P/E Ratio: <strong>${peRatio.toFixed(2)} g/100kcal</strong></div>
    `;
}
// Run once on load
calculate();
</script>

</body>
</html>
