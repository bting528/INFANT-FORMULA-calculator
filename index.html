<!DOCTYPE html>
<html>
<head>
    <title>HK Clinical Calc v4.7.2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Infant Calc">
    
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/bting528/INFANT-FORMULA-calculator/refs/heads/main/IMG_6019.png">
    
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; max-width: 1000px; margin: auto; background: #f0f2f5; color: #333; }
        .title-bar { text-align: center; margin-bottom: 5px; }
        .app-name { font-size: 1.4em; font-weight: bold; color: #0056b3; text-transform: uppercase; letter-spacing: 1px; }
        .db-version { font-size: 0.65em; background: #e0e0e0; color: #666; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 4px; vertical-align: middle; }
        .container { display: flex; flex-wrap: wrap; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex: 1; min-width: 350px; border-top: 5px solid #0056b3; }
        h2 { color: #0056b3; margin-top: 0; font-size: 1.1em; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.8em; color: #666; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        .mod-section { background: #fffde7; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #ffe082; }
        .result-box { margin-top: 15px; padding: 15px; background: #f8fbff; border-radius: 8px; border: 1px solid #d1e3f8; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.05em; }
        .daily-subtext { font-size: 0.85em; color: #555; border-top: 1px solid #eee; padding-top: 8px; margin-top: 8px; }
        .val { font-weight: bold; }
        .divider { border: 0; border-top: 1px solid #ddd; margin: 12px 0; }
        .alert { color: #d32f2f !important; border-color: #d32f2f !important; font-weight: 900; }
        .gir-box { background: #fff3e0; border-left: 5px solid #ff9800; padding: 8px; margin-top: 10px; font-size: 0.9em; }
        .weight-section { width: 100%; margin-bottom: 15px; background: #0056b3; padding: 15px; border-radius: 12px; color: white; }
        .footer-info { text-align: center; font-size: 0.7em; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="title-bar">
    <div class="app-name">👶🏻 Infant Feeding Calc</div>
    <div class="db-version">DB DRILL VERIFIED: 2026-04-28</div>
</div>

<div class="weight-section">
    <label style="color:white; margin-top:0;">Infant Weight (kg)</label>
    <input type="number" id="weight" value="1.5" step="0.1" oninput="calculateAll()">
</div>

<div class="container">
    <div class="card">
        <h2>🛠️ Powder Formula</h2>
        <select id="p_formula" onchange="calculateAll()">
            <optgroup label="Standard (1:30)">
                <option value="500,10.5,58,26,4.4,30">Enfamil A+ 1</option>
                <option value="506,11.2,57.6,25.6,4.4,30">Friso Gold 1</option>
                <option value="499,9.7,59.8,24.5,4.5,30">Cow & Gate 1</option>
                <option value="511,9.7,59.3,26.1,4.37,30">Nan Pro 1</option>
                <option value="510,10.2,56,27.3,4.4,30">illuma 1</option>
                <option value="518,11,57.1,27.5,4.4,30">S26 Gold 1</option>
                <option value="507,10.9,57.4,26,4.3,30">Frisolac Gold Comfort</option>
                <option value="500,13.5,52,27,4.97,30">Enfamil Step Up Care (C22)</option>
                <option value="505,10.7,56,26,4.3,30">Enfamil Lactofree</option>
            </optgroup>
            <optgroup label="Special Dilution">
                <option value="523,13.4,56,28,8.7,60">Isomil (Soy) - 1:60</option>
                <option value="508,10.2,55,27,8.8,60">Similac 1 - 1:60</option>
                <option value="463,13.9,60,18.9,9.2,38">Pediasure 1+ - 1:38</option>
                <option value="468,13.9,60.7,18.3,7.85,30">Nutren Junior</option>
                <option value="463,13.6,62.4,18.1,7.9,30">Peptamen Junior</option>
            </optgroup>
        </select>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Scoops</label><input type="number" id="p_scoops" value="3" step="0.5" oninput="calculateAll()"></div>
            <div><label>Water (ml)</label><input type="number" id="p_water" value="90" oninput="calculateAll()"></div>
        </div>
        <div class="mod-section">
            <label>+ Polycal (g/feed)</label><input type="number" id="p_poly" value="0" step="0.1" oninput="calculateAll()">
            <label>+ Fat Mod. (ml/feed)</label><input type="number" id="p_fat" value="0" step="0.1" oninput="calculateAll()">
        </div>
        <label>Feeds/Day</label><input type="number" id="p_feeds" value="8" oninput="calculateAll()">
        <div id="p_results"></div>
    </div>

    <div class="card">
        <h2>🍼 Liquid / EBM / HMF</h2>
        <select id="l_formula" onchange="calculateAll()">
            <optgroup label="Human Milk (EBM)">
                <option value="67,1.2,7,3.5">EBM (Plain)</option>
                <option value="75.7,1.92,7.64,3.86">EBM + Half HMF</option>
                <option value="84.4,2.64,8.28,4.22">EBM + Full HMF</option>
            </optgroup>
            <optgroup label="HK RTF Formulas">
                <option value="101,2.6,10.3,5.4">Infatrini RTF (C30)</option>
                <option value="81,2.4,8.9,3.9">Frisolac Prem RTF (C24)</option>
                <option value="74,2.1,7.7,3.8">Enfamil Step Up RTF (C22)</option>
                <option value="67,1.3,7.6,3.4">Enfamil A+ 1 RTF</option>
                <option value="67,1.3,7,3.6">S26 Gold 1 RTF</option>
                <option value="68,1.3,7.6,3.4">Similac Baby 1 RTF</option>
                <option value="66,1.3,7.4,3.4">Cow & Gate 1 RTF</option>
                <option value="66,1.4,7.3,3.4">Friso Gold 1 RTF</option>
                <option value="67,1.4,7.5,3.4">Smart Baby 1 RTF</option>
            </optgroup>
        </select>
        <label>Volume per Feed (ml)</label><input type="number" id="l_vol" value="25" oninput="calculateAll()">
        <div class="mod-section">
            <label>+ Polycal (g/feed)</label><input type="number" id="l_poly" value="0" step="0.1" oninput="calculateAll()">
            <label>+ Fat Mod. (ml/feed)</label><input type="number" id="l_fat" value="0" step="0.1" oninput="calculateAll()">
        </div>
        <label>Feeds per Day</label><input type="number" id="l_feeds" value="8" oninput="calculateAll()">
        <div id="l_results"></div>
    </div>
</div>

<div class="footer-info">
    VER 4.7.2 | DATABASE VERIFIED BY CSV DRILL: 2026-04-28<br>
    PRECISION: EBM HALF-FAT 3.86g | FULL-FAT 4.22g
</div>

<script>
    function calculateAll() {
        const w = parseFloat(document.getElementById('weight').value) || 1;

        // POWDER LOGIC
        const pD = document.getElementById('p_formula').value.split(',');
        const p_sc = parseFloat(document.getElementById('p_scoops').value) || 0;
        const p_wa = parseFloat(document.getElementById('p_water').value) || 0;
        const p_fe = parseFloat(document.getElementById('p_feeds').value) || 0;
        const p_poly = parseFloat(document.getElementById('p_poly').value) || 0;
        const p_fat_m = parseFloat(document.getElementById('p_fat').value) || 0;

        const p_daily_mass = p_sc * parseFloat(pD[4]) * p_fe;
        const p_total_vol = (p_wa + (p_sc * parseFloat(pD[4]) * 0.75)) * p_fe;
        
        let pk = (p_daily_mass / 100) * parseFloat(pD[0]) + (p_poly * 3.8 * p_fe) + (p_fat_m * 4.5 * p_fe);
        let pp = (p_daily_mass / 100) * parseFloat(pD[1]);
        let pc = (p_daily_mass / 100) * parseFloat(pD[2]) + (p_poly * 0.94 * p_fe);
        let pf = (p_daily_mass / 100) * parseFloat(pD[3]) + (p_fat_m * 0.5 * p_fe);

        renderResult('p_results', pk, pp, p_total_vol, w, (pk/p_total_vol)*29.57, (pc*1000)/(w*1440), pc, pf, parseFloat(pD[5])/(p_wa/p_sc), p_poly, p_fat_m, p_total_vol/p_fe);

        // LIQUID LOGIC
        const lD = document.getElementById('l_formula').value.split(',');
        const lv = parseFloat(document.getElementById('l_vol').value) || 0;
        const lf = parseFloat(document.getElementById('l_feeds').value) || 0;
        const lp = parseFloat(document.getElementById('l_poly').value) || 0;
        const lfm = parseFloat(document.getElementById('l_fat').value) || 0;

        const l_vol_total = lv * lf;
        let lk = ((parseFloat(lD[0])/100) * l_vol_total) + (lp * 3.8 * lf) + (lfm * 4.5 * lf);
        let l_pr = (parseFloat(lD[1])/100) * l_vol_total;
        let l_c = ((parseFloat(lD[2])/100) * l_vol_total) + (lp * 0.94 * lf);
        let l_f = ((parseFloat(lD[3])/100) * l_vol_total) + (lfm * 0.5 * lf);

        renderResult('l_results', lk, l_pr, l_vol_total, w, (lk/l_vol_total)*29.57, (l_c*1000)/(w*1440), l_c, l_f, null, lp, lfm, lv);
    }

    function renderResult(id, kcal, pro, vol, w, oz, gir, cho, fat, str, mp, mf, vf) {
        const cho_pct = (cho / (vol / 100)).toFixed(1);
        const fat_pct = (fat / (vol / 100)).toFixed(1);

        document.getElementById(id).innerHTML = `
            <div class="result-box">
                <div class="stats"><span>Energy:</span> <span class="val">${(kcal/w).toFixed(1)} kcal/kg</span></div>
                <div class="stats"><span>Protein:</span> <span class="val">${(pro/w).toFixed(2)} g/kg</span></div>
                <div class="stats"><span>Fluid:</span> <span class="val">${(vol/w).toFixed(0)} ml/kg</span></div>
                <div class="divider"></div>
                <div class="stats"><span>Density:</span> <span class="val">${oz.toFixed(1)} kcal/oz</span></div>
                ${str ? `<div class="stats"><span>Strength:</span> <span class="val ${ (str > 1.2 || str < 0.8) ? 'alert' : '' }">${str.toFixed(2)}x Std</span></div>` : ''}
                <div class="gir-box"><strong>GIR:</strong> ${gir.toFixed(2)} mg/kg/min</div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <div class="val" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:6px; text-align:center; font-size:0.85em; color:#1976d2; background:white;">CHO: ${cho_pct}%</div>
                    <div class="val" style="flex:1; padding:8px; border:1px solid #ddd; border-radius:6px; text-align:center; font-size:0.85em; color:#388e3c; background:white;">Fat: ${fat_pct}%</div>
                </div>
                <div class="daily-subtext">
                    <div class="stats"><span>Daily Energy:</span> <b>${kcal.toFixed(0)} kcal</b></div>
                    <div class="stats"><span>Daily Protein:</span> <b>${pro.toFixed(1)} g</b></div>
                    <div class="stats"><span>Daily Carbs:</span> <b>${cho.toFixed(1)} g</b></div>
                </div>
            </div>
        `;
    }
    calculateAll();
</script>
</body>
</html>
