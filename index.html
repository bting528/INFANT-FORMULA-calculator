<!DOCTYPE html>
<html>
<head>
    <title>HK Clinical Calc v3.7</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 15px; max-width: 1000px; margin: auto; background: #f0f2f5; color: #333; }
        .container { display: flex; flex-wrap: wrap; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); flex: 1; min-width: 350px; border-top: 5px solid #0056b3; }
        h2 { color: #0056b3; margin-top: 0; font-size: 1.1em; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { display: block; margin-top: 10px; font-weight: 600; font-size: 0.8em; color: #666; text-transform: uppercase; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        .mod-section { background: #fffde7; padding: 10px; border-radius: 8px; margin-top: 10px; border: 1px solid #ffe082; }
        .result-box { margin-top: 15px; padding: 15px; background: #f8fbff; border-radius: 8px; border: 1px solid #d1e3f8; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 1.05em; }
        .val { font-weight: bold; }
        .divider { border: 0; border-top: 1px solid #ddd; margin: 12px 0; }
        .alert { color: #d32f2f !important; border-color: #d32f2f !important; font-weight: 900; }
        .concentration-box { display: flex; gap: 10px; margin-top: 10px; }
        .conc-item { flex: 1; padding: 8px; border-radius: 6px; text-align: center; font-size: 0.85em; font-weight: bold; border: 1px solid #ddd; background: white; }
        .mod-load { font-size: 0.75em; color: #777; margin-top: 8px; font-style: italic; text-align: right; }
        .gir-box { background: #fff3e0; border-left: 5px solid #ff9800; padding: 8px; margin-top: 10px; font-size: 0.9em; }
        .weight-section { width: 100%; margin-bottom: 15px; background: #0056b3; padding: 15px; border-radius: 12px; color: white; }
    </style>
</head>
<body>

<div class="weight-section">
    <label style="color:white; margin-top:0;">Infant Weight (kg)</label>
    <input type="number" id="weight" value="1.5" step="0.1" oninput="calculateAll()">
</div>

<div class="container">
    <div class="card">
        <h2>🛠️ Powder Formula</h2>
        <select id="p_formula" onchange="calculateAll()">
            <optgroup label="HK Standard (1:30)">
                <option value="510,10.6,54,26.5,4.4,30">Enfamil A+ 1</option>
                <option value="510,10.3,57,25.8,4.3,30">Friso Gold 1</option>
                <option value="510,10.5,56,26.0,4.4,30">Cow & Gate 1</option>
                <option value="510,9.8,56,26.0,4.4,30">Nan Pro 1</option>
                <option value="517,10.1,55,27.0,4.3,30">illuma 1</option>
                <option value="513,10.1,56,27.0,4.3,30">S26 Gold 1</option>
                <option value="510,10.5,56,25.4,4.4,30">Frisolac Gold Comfort</option>
            </optgroup>
            <optgroup label="Specialty / Junior">
                <option value="510,14.5,53,26.7,4.9,30">Enfamil Step Up Care (C22)</option>
                <option value="523,13.4,56,28.0,4.4,30">Isomil (Soy)</option>
                <option value="463,13.9,60,18.9,9.2,38">Pediasure 1+</option>
                <option value="506,15.2,56,24.0,7.9,30">Nutren Junior</option>
                <option value="464,15.0,55,21.0,8.0,30">Peptamen Junior</option>
            </optgroup>
            <optgroup label="Abbott HK (1:60)">
                <option value="508,10.2,55,27.0,4.4,60">Similac 1</option>
            </optgroup>
        </select>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Scoops</label><input type="number" id="p_scoops" value="3" step="0.5" oninput="calculateAll()"></div>
            <div><label>Water (ml)</label><input type="number" id="p_water" value="90" oninput="calculateAll()"></div>
        </div>

        <div class="mod-section">
            <label>+ Polycal (g/feed)</label><input type="number" id="p_poly" value="0" step="0.1" oninput="calculateAll()">
            <label>+ Liquigen/Calogen (ml/feed)</label><input type="number" id="p_fat" value="0" step="0.1" oninput="calculateAll()">
        </div>

        <label>Feeds/Day</label><input type="number" id="p_feeds" value="8" oninput="calculateAll()">
        <div id="p_results"></div>
    </div>

    <div class="card">
        <h2>🍼 Liquid / EBM / HMF</h2>
        <select id="l_formula" onchange="calculateAll()">
            <optgroup label="Human Milk (EBM)">
                <option value="67,1.2,7.0,3.5">EBM (Plain)</option>
                <option value="75.7,1.92,7.64,4.2">EBM + Half HMF</option>
                <option value="84.4,2.64,8.28,4.8">EBM + Full HMF</option>
            </optgroup>
            <optgroup label="HK RTF Formulas">
                <option value="101,2.6,10.3,5.4">Infatrini RTF (C30)</option>
                <option value="81,2.4,8.9,3.9">Frisolac Prem RTF (C24)</option>
                <option value="74,2.1,7.7,3.8">Enfamil Step Up RTF (C22)</option>
                <option value="67,1.3,7.6,3.4">Enfamil A+ 1 RTF</option>
                <option value="67,1.3,7.0,3.6">S26 Gold 1 RTF</option>
                <option value="68,1.3,7.6,3.4">Similac Baby 1 RTF</option>
                <option value="66,1.3,7.4,3.4">Cow & Gate 1 RTF</option>
                <option value="66,1.4,7.3,3.4">Friso Gold 1 RTF</option>
                <option value="67,1.4,7.5,3.4">Smart Baby 1 RTF</option>
            </optgroup>
        </select>

        <label>Volume per Feed (ml)</label><input type="number" id="l_vol" value="25" oninput="calculateAll()">

        <div class="mod-section">
            <label>+ Polycal (g/feed)</label><input type="number" id="l_poly" value="0" step="0.1" oninput="calculateAll()">
            <label>+ Liquigen/Calogen (ml/feed)</label><input type="number" id="l_fat" value="0" step="0.1" oninput="calculateAll()">
        </div>

        <label>Feeds per Day</label><input type="number" id="l_feeds" value="8" oninput="calculateAll()">
        <div id="l_results"></div>
    </div>
</div>

<script>
function calculateAll() {
    const w = parseFloat(document.getElementById('weight').value) || 1;

    // POWDER LOGIC
    const pD = document.getElementById('p_formula').value.split(',');
    const p_sc = parseFloat(document.getElementById('p_scoops').value) || 0;
    const p_wa = parseFloat(document.getElementById('p_water').value) || 0;
    const p_fe = parseFloat(document.getElementById('p_feeds').value) || 0;
    const p_poly = parseFloat(document.getElementById('p_poly').value) || 0;
    const p_fat_m = parseFloat(document.getElementById('p_fat').value) || 0;

    const p_total_vol = (p_wa + (p_sc * parseFloat(pD[4]) * 0.75)) * p_fe;
    const p_single_vol = p_total_vol / (p_fe > 0 ? p_fe : 1);

    const p_m_total = p_sc * parseFloat(pD[4]) * p_fe;
    let p_kcal = (p_m_total / 100) * parseFloat(pD[0]) + (p_poly * 3.8 * p_fe) + (p_fat_m * 4.5 * p_fe);
    let p_pro = (p_m_total / 100) * parseFloat(pD[1]);
    let p_cho = (p_m_total / 100) * parseFloat(pD[2]) + (p_poly * 0.94 * p_fe);
    let p_fat = (p_m_total / 100) * parseFloat(pD[3]) + (p_fat_m * 0.5 * p_fe);

    renderResult('p_results', p_kcal, p_pro, p_total_vol, w, (p_kcal/p_total_vol)*29.57, (p_cho*1000)/(w*1440), p_cho, p_fat, parseFloat(pD[5])/(p_wa/p_sc), p_poly, p_fat_m, p_single_vol);

    // LIQUID LOGIC
    const lD = document.getElementById('l_formula').value.split(',');
    const l_v_feed = parseFloat(document.getElementById('l_vol').value) || 0;
    const l_f = parseFloat(document.getElementById('l_feeds').value) || 0;
    const l_poly = parseFloat(document.getElementById('l_poly').value) || 0;
    const l_fat_m = parseFloat(document.getElementById('l_fat').value) || 0;

    const l_vol_total = l_v_feed * l_f;
    let l_kcal = ((parseFloat(lD[0])/100) * l_vol_total) + (l_poly * 3.8 * l_f) + (l_fat_m * 4.5 * l_f);
    let l_pro = (parseFloat(lD[1])/100) * l_vol_total;
    let l_cho = ((parseFloat(lD[2])/100) * l_vol_total) + (l_poly * 0.94 * l_f);
    let l_fat = ((parseFloat(lD[3])/100) * l_vol_total) + (l_fat_m * 0.5 * l_f);

    renderResult('l_results', l_kcal, l_pro, l_vol_total, w, (l_kcal/l_vol_total)*29.57, (l_cho*1000)/(w*1440), l_cho, l_fat, null, l_poly, l_fat_m, l_v_feed);
}

function renderResult(id, kcal, pro, vol, w, oz, gir, cho, fat, str, m_p, m_f, v_f) {
    const cho_pct = (cho / (vol / 100)).toFixed(1);
    const fat_pct = (fat / (vol / 100)).toFixed(1);
    const p_load = v_f > 0 ? ((m_p / v_f) * 100).toFixed(1) : 0;
    const f_load = v_f > 0 ? ((m_f / v_f) * 100).toFixed(1) : 0;

    let strHtml = str ? `<div class="stats"><span>Strength:</span> <span class="${(str > 1.2 || str < 0.8) ? 'val alert' : 'val'}">${str.toFixed(2)}x Std</span></div>` : '';

    document.getElementById(id).innerHTML = `
        <div class="result-box">
            <div class="stats"><span>Energy:</span> <span class="val">${(kcal/w).toFixed(1)} kcal/kg</span></div>
            <div class="stats"><span>Protein:</span> <span class="val">${(pro/w).toFixed(2)} g/kg</span></div>
            <div class="stats"><span>Fluid:</span> <span class="val">${(vol/w).toFixed(0)} ml/kg</span></div>
            <div class="divider"></div>
            <div class="stats"><span>Density:</span> <span class="val">${oz.toFixed(1)} kcal/oz</span></div>
            ${strHtml}
            <div class="gir-box"><strong>GIR:</strong> ${gir.toFixed(2)} mg/kg/min</div>
            <div class="concentration-box">
                <div class="conc-item ${cho_pct > 12 ? 'alert' : ''}" style="color:#1976d2">CHO: ${cho_pct}%</div>
                <div class="conc-item ${fat_pct > 7 ? 'alert' : ''}" style="color:#388e3c">Fat: ${fat_pct}%</div>
            </div>
            <div class="mod-load">Modular Load: P ${p_load}% | L/C ${f_load}%</div>
        </div>
    `;
}
calculateAll();
</script>
</body>
</html>
