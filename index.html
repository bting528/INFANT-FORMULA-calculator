<!DOCTYPE html>
<html>
<head>
    <title>Infant Nutrition Calc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .result-box { margin-top: 20px; padding: 15px; background: #e8f4fd; border-radius: 5px; border-left: 5px solid #3498db; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍼 Infant Nutrition Calc</h2>
    
    <label>Infant Weight (kg)</label>
    <input type="number" id="weight" value="3.5" step="0.1" oninput="calculate()">

    <label>Select Formula</label>
    <select id="formula" onchange="calculate()">
        <option value="67,1.3,4.4">Standard Stage 1 (C20)</option>
        <option value="74,2.1,4.9">Enfamil A+ Step Up (C22)</option>
        <option value="101,2.6,5.0">Infatrini (C30)</option>
        <option value="67,1.8,4.5">Pepti-Junior (C20)</option>
        <option value="67,1.8,4.6">Neocate LCP (C20)</option>
    </select>

    <div class="grid">
        <div>
            <label>Scoops/Feed</label>
            <input type="number" id="scoops" value="3" step="0.5" oninput="calculate()">
        </div>
        <div>
            <label>Water (ml)</label>
            <input type="number" id="water" value="90" oninput="calculate()">
        </div>
    </div>

    <label>Feeds per Day</label>
    <input type="number" id="feeds" value="8" oninput="calculate()">

    <div class="result-box" id="results">
        </div>
</div>

<script>
function calculate() {
    const weight = parseFloat(document.getElementById('weight').value);
    const formulaData = document.getElementById('formula').value.split(',');
    const kcal100 = parseFloat(formulaData[0]);
    const pro100 = parseFloat(formulaData[1]);
    const scoopG = parseFloat(formulaData[2]);
    
    const scoops = parseFloat(document.getElementById('scoops').value);
    const water = parseFloat(document.getElementById('water').value);
    const numFeeds = parseFloat(document.getElementById('feeds').value);
    
    const powderG = scoops * scoopG;
    const volPerFeed = water + (powderG * 0.75);
    const dailyVol = volPerFeed * numFeeds;
    
    const totalKcal = (kcal100 / 100) * dailyVol;
    const totalPro = (pro100 / 100) * dailyVol;
    const peRatio = (totalPro / totalKcal) * 100;

    document.getElementById('results').innerHTML = `
        <strong>Daily Totals:</strong><br>
        Energy: ${(totalKcal/weight).toFixed(1)} kcal/kg<br>
        Protein: ${(totalPro/weight).toFixed(2)} g/kg<br>
        Fluid: ${(dailyVol/weight).toFixed(0)} ml/kg<br><br>
        <strong>P/E Ratio:</strong> ${peRatio.toFixed(2)} g/100kcal
    `;
}
calculate(); // Initial run
</script>

</body>
</html>
