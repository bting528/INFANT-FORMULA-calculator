<!DOCTYPE html>
<html>
<head>
    <title>UCH Clinical Formula Calc</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #0056b3; margin-top: 0; border-bottom: 2px solid #eef; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.95em; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        .result-box { margin-top: 25px; padding: 20px; background: #e3f2fd; border-radius: 10px; border-left: 6px solid #2196f3; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .stats { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 1.05em; }
        .val { font-weight: bold; }
        .divider { border: 0; border-top: 1px solid #bcd; margin: 12px 0; }
        .hidden { display: none; }
        .highlight { color: #d35400; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>🍼 Clinical Intake Calc</h2>
    
    <label>Infant Weight (kg)</label>
    <input type="number" id="weight" value="3.5" step="0.1" oninput="calculate()">

    <label>Select Formula</label>
    <select id="formula" onchange="toggleInputs()">
        <optgroup label="Polymeric">
            <option value="510,10.5,56,4.4,30,powder">Standard Stage 1 (C20)</option>
            <option value="510,14.5,53,4.9,30,powder">Enfamil Step Up (C22)</option>
            <option value="81,2.4,8.9,0,0,rtf">Frisolac Prem RTF (C24)</option>
            <option value="510,13.1,52,5.0,30,powder">Infatrini (C30)</option>
        </optgroup>
        <optgroup label="EHF / Elemental">
            <option value="503,13.5,51,4.5,30,powder">Pepti-Junior (C20)</option>
            <option value="500,13.5,54,4.6,30,powder">Neocate LCP (C20)</option>
        </optgroup>
    </select>

    <div id="powder-inputs">
        <div class="grid">
            <div>
                <label>Scoops/Feed</label>
                <input type="number" id="scoops" value="3" step="0.5" oninput="calculate()">
            </div>
            <div>
                <label>Water (ml)</label>
                <input type="number" id="water" value="90" oninput="calculate()">
            </div>
        </div>
        <label>Feeds per Day</label>
        <input type="number" id="feeds" value="8" oninput="calculate()">
    </div>

    <div id="rtf-inputs" class="hidden">
        <label>Total Daily Volume (ml)</label>
        <input type="number" id="daily_vol_rtf" value="500" oninput="calculate()">
    </div>

    <div class="result-box" id="results"></div>
</div>

<script>
function toggleInputs() {
    const type = document.getElementById('formula').value.split(',')[5];
    document.getElementById('powder-inputs').classList.toggle('hidden', type === 'rtf');
    document.getElementById('rtf-inputs').classList.toggle('hidden', type === 'powder');
    calculate();
}

function calculate() {
    const weight = parseFloat(document.getElementById('weight').value) || 1;
    const data = document.getElementById('formula').value.split(',');
    
    const kcal100g = parseFloat(data[0]);
    const pro100g = parseFloat(data[1]);
    const scoopG = parseFloat(data[3]);
    const stdVolPerScoop = parseFloat(data[4]);
    const type = data[5];

    let totalKcal, totalPro, dailyVol, kcalPerOz, strengthStr;

    if (type === 'rtf') {
        dailyVol = parseFloat(document.getElementById('daily_vol_rtf').value) || 0;
        totalKcal = (kcal100g / 100) * dailyVol;
        totalPro = (pro100g / 100) * dailyVol;
        kcalPerOz = (totalKcal / dailyVol) * 29.57;
        strengthStr = "RTF (Standard)";
    } else {
        const scoops = parseFloat(document.getElementById('scoops').value) || 0;
        const water = parseFloat(document.getElementById('water').value) || 0;
        const feeds = parseFloat(document.getElementById('feeds').value) || 0;
        
        const dailyPowderG = scoops * scoopG * feeds;
        totalKcal = (dailyPowderG / 100) * kcal100g;
        totalPro = (dailyPowderG / 100) * pro100g;
        
        // Volume calculation with displacement
        const volPerFeed = water + (scoops * scoopG * 0.75);
        dailyVol = volPerFeed * feeds;
        
        // Energy Density
        kcalPerOz = (totalKcal / dailyVol) * 29.57;

        // Dilution Strength Logic
        // Actual ml/scoop vs Standard ml/scoop
        const actualMlPerScoop = water / scoops;
        const strengthRatio = stdVolPerScoop / actualMlPerScoop;
        strengthStr = strengthRatio.toFixed(2) + "x Standard";
    }

    document.getElementById('results').innerHTML = `
        <div class="stats"><span>Energy:</span> <span class="val">${(totalKcal/weight).toFixed(1)} kcal/kg</span></div>
        <div class="stats"><span>Protein:</span> <span class="val">${(totalPro/weight).toFixed(2)} g/kg</span></div>
        <div class="stats"><span>Fluid:</span> <span class="val">${(dailyVol/weight).toFixed(0)} ml/kg</span></div>
        
        <div class="divider"></div>
        
        <div class="stats"><span>Energy Density:</span> <span class="val highlight">${kcalPerOz.toFixed(1)} kcal/oz</span></div>
        <div class="stats"><span>Prep Strength:</span> <span class="val">${strengthStr}</span></div>
        <div class="stats" style="font-size:0.9em;">P/E Ratio: <span>${((totalPro/totalKcal)*100).toFixed(2)} g/100kcal</span></div>
    `;
}
toggleInputs();
</script>
</body>
</html>
